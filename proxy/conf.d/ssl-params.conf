# ============================================================
# ssl-params.conf — Shared SSL/TLS Parameters
#
# Di-include oleh setiap server block HTTPS:
#   include /etc/nginx/conf.d/ssl-params.conf;
#
# File ini berisi setting SSL tingkat lanjut yang berlaku
# per-server-block. Setting global (ssl_protocols, dll.)
# sudah ada di nginx.conf di level http{}.
# ============================================================

# ----- Cipher Suite (Mozilla Intermediate) -----
# Kompatibel dengan browser modern, balance antara keamanan & performa
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# ----- Session Cache (performa) -----
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ----- HSTS — paksa HTTPS -----
# max-age=63072000 = 2 tahun
# Hapus includeSubDomains jika hanya satu subdomain yang pakai HTTPS
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# ----- OCSP Stapling (production only) -----
# Mempercepat TLS handshake dengan pre-fetch status sertifikat.
# Aktifkan di production (Let's Encrypt). Nonaktifkan untuk mkcert lokal
# karena mkcert CA tidak punya OCSP responder.
#
# ssl_stapling        on;
# ssl_stapling_verify on;
# resolver            8.8.8.8 8.8.4.4 valid=300s;
# resolver_timeout    5s;
