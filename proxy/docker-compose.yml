services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro            # Sertifikat SSL (mkcert / Let's Encrypt)
      - certbot-www:/var/www/certbot:ro        # ACME challenge (Let's Encrypt production)
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  certbot-www:   # Shared webroot untuk ACME challenge Let's Encrypt

networks:
  proxy-network:
    external: true